[package]
  name        = "sumi"
  version     = "1.1.0"
  edition     = "2021"

[dependencies]
  axum              = { version = "0.8.9" }
  bytes             = "1.11.1"
  fontdue           = "0.9.3"
  log               = "0.4.30"
  mimalloc          = "0.1.52"
  moka              = { version = "0.12.15", features = ["future"] }
  pretty_env_logger = "0.5.0"
  serde             = { version = "1.0.217", features = ["derive"] }
  serde_json        = "1.0.150"
  tokio             = { version = "1.52.3", features = ["rt-multi-thread", "sync", "fs", "signal", "macros", "net", "time"] }
  webpx             = "0.3.4"

[dev-dependencies]
  tempfile = "3"

[profile.release]
  lto           = "fat"
  opt-level     = 3
  codegen-units = 1
  panic         = "abort"
  strip         = "symbols"  

[profile.dev]
  debug = false
