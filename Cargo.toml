[package]
  name        = "sumi"
  version     = "1.0.0"
  edition     = "2021"

[dependencies]
  axum              = { version = "0.8.8", features = ["macros"] }
  tokio             = { version = "1.50.0", features = ["rt-multi-thread", "sync", "fs", "signal"] }
  tower-http        = { version = "0.6.8", features = ["timeout"] }
  image             = { version = "0.25.10", features = ["webp"] }
  webpx             = "0.1.3"
  serde             = { version = "1.0.228", features = ["derive"] }
  serde_json        = "1.0.149"
  log               = "0.4.29"
  pretty_env_logger = "0.5.0"
  fontdue           = "0.9.3"
  bytes             = "1.11.1"
  itoa              = "1.0.18"
  mimalloc          = "0.1.48"
  moka              = { version = "0.12.14", features = ["future"] }
  thiserror         = "2.0.18"

[dev-dependencies]
  tempfile = "3"

[profile.release]
  lto           = "fat"
  opt-level     = 3
  codegen-units = 1
  strip         = true
  panic         = "abort"
  incremental   = false