[package]
  name        = "sumi"
  version     = "1.1.0"
  edition     = "2021"

[dependencies]
  axum              = { version = "0.8.9" }
  tokio             = { version = "1.43.0", features = ["rt-multi-thread", "sync", "fs", "signal", "macros", "net", "time"] }
  webpx             = "0.3.4"
  serde             = { version = "1.0.217", features = ["derive"] }
  serde_json        = "1.0.138"
  log               = "0.4.25"
  pretty_env_logger = "0.5.0"
  fontdue           = "0.9.3"
  bytes             = "1.9.0"
  itoa              = "1.0.14"
  mimalloc          = "0.1.43"
  moka              = { version = "0.12.5", features = ["future"] }

[dev-dependencies]
  tempfile = "3"

[profile.release]
  lto           = "true"
  opt-level     = 3
  codegen-units = 1
  panic         = "abort"
