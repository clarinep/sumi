name: Benchmark sumi

on:
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup rust
      run: rustup toolchain install stable

    - name: Setup wrk
      run: sudo apt-get update && sudo apt-get install -y wrk

    - name: Build sumi
      run: cargo build --release

    - name: Run benchmark
      env:
        CARDS_DIR: "assets"
        PORT: 6767
        RUST_LOG: info
      run: |
        ./target/release/sumi > sumi.log 2>&1 &
        SUMI_PID=$!
        sleep 3
        wrk -t4 -c4 -d10s -s benchmark.lua http://localhost:6767
        echo -e "\n\n\n"
        wrk -t4 -c100 -d30s --timeout 10s -s benchmark.lua http://localhost:6767
        kill $SUMI_PID || true
        echo -e "\n"
        cat sumi.log
  
